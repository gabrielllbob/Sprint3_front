<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Lista de Clientes</h2>
  <button class="btn btn-primary" routerLink="/clientes/novo">Novo Cliente</button>
</div>

<table class="table table-striped table-bordered">
  <thead class="thead-dark">
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>CPF</th>
      <th>Endereço</th>
      <th>Nascimento</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let c of clientes">
      <td>{{ c.ideCliente }}</td>
      <td>{{ c.nomCliente }}</td>
      <td>{{ c.nroCPF }}</td>
      <td>{{ c.nomEndereco }}</td>
      <td>{{ c.dtcNascimento | date:'dd/MM/yyyy' }}</td>
      <td>{{ c.stsAtivo ? 'Ativo' : 'Inativo' }}</td>
      <td>
        <button class="btn btn-sm btn-warning me-2" [routerLink]="['/clientes/editar', c.ideCliente]">Editar</button>
        
        <button class="btn btn-sm btn-danger" (click)="excluir(c.ideCliente!)">Excluir</button>
      </td>
    </tr>
  </tbody>
</table>
