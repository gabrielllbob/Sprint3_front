<h2>Realizar Transação</h2>
<div class="alert alert-info">A API verificará o saldo na stored procedure automaticamente.</div>

<form (ngSubmit)="executar()" #transacaoForm="ngForm">
  
  <div class="form-group">
    <label>Tipo de Transação</label>
    <select class="form-control" name="tipoTransacao" [(ngModel)]="transacao.tipoTransacao" required>
      <option value="Depósito">Depósito</option>
      <option value="Saque">Saque</option>
      <option value="Transferência">Transferência</option>
    </select>
  </div>

  <div class="form-group">
    <label>Valor (R$)</label>
    <input type="number" class="form-control" name="valor" [(ngModel)]="transacao.valor" required min="1">
  </div>

  <div class="form-group">
    <label>ID Conta Origem</label>
    <input type="number" class="form-control" name="contaOrigemId" [(ngModel)]="transacao.contaOrigemId" required>
  </div>

  <div class="form-group">
    <label>ID Conta Destino</label>
    <input type="number" class="form-control" name="contaFinalId" [(ngModel)]="transacao.contaFinalId" required>
  </div>

  <button type="submit" class="btn btn-warning mt-3" [disabled]="!transacaoForm.form.valid">Executar Transação</button>
</form>
