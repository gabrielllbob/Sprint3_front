<h2>Novo Cliente</h2>
<form (ngSubmit)="salvar()" #clienteForm="ngForm">
  
  <div class="form-group">
    <label>Nome Completo</label>
    <input type="text" class="form-control" name="nomCliente" [(ngModel)]="cliente.nomCliente" required>
  </div>

  <div class="form-group">
    <label>CPF (Apenas números)</label>
    <input type="text" class="form-control" name="nroCPF" [(ngModel)]="cliente.nroCPF" required maxlength="11">
  </div>

  <div class="form-group">
    <label>Endereço</label>
    <input type="text" class="form-control" name="nomEndereco" [(ngModel)]="cliente.nomEndereco" required>
  </div>

  <div class="form-group">
    <label>Data de Nascimento</label>
    <input type="date" class="form-control" name="dtcNascimento" [(ngModel)]="cliente.dtcNascimento" required>
  </div>
  
  <div class="mb-3">
    <label for="senhaHash" class="form-label">Senha</label>
    <input type="password" class="form-control" id="senhaHash" name="senhaHash" 
          [(ngModel)]="cliente.senhaHash" required>
  </div>

  <div class="mb-3">
    <label for="role" class="form-label">Perfil do Usuário</label>
    <select class="form-select" id="role" name="role" [(ngModel)]="cliente.role">
      <option value="CLIENTE" selected>Cliente Padrão</option>
      <option value="ADMIN">Administrador</option>
    </select>
  </div>

  <button type="submit" class="btn btn-success mt-3" [disabled]="!clienteForm.form.valid">Salvar</button>
  <button type="button" class="btn btn-secondary mt-3 ml-2" routerLink="/clientes">Voltar</button>
</form>
