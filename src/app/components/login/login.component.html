<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-header bg-primary text-white text-center">
        <h4>Login do Sistema</h4>
      </div>
      <div class="card-body">
        
        <div *ngIf="mensagemErro" class="alert alert-danger">
          {{ mensagemErro }}
        </div>

        <form (ngSubmit)="entrar()" #loginForm="ngForm">
          <div class="mb-3">
            <label class="form-label">CPF (Digite: admin ou 123)</label>
            <input type="text" class="form-control" name="cpf" [(ngModel)]="cpf" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Senha (Digite: admin ou 123)</label>
            <input type="password" class="form-control" name="senha" [(ngModel)]="senha" required>
          </div>

          <button type="submit" class="btn btn-primary w-100" [disabled]="!loginForm.valid">
            Entrar
          </button>
        </form>

      </div>
    </div>
  </div>
</div>
